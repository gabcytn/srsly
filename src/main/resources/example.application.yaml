spring:
  application:
    name: srsly
    frontend:
      url: http://localhost:5173
  datasource:
    url: jdbc:postgresql://localhost:5432/srsly
    username:
    password:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
  ai:
    google:
      genai:
        api-key: <api-key>
    retry:
      max-attempts: 2

security:
  jwt:
    secret-key: <secret-key>
    expiration-time: 300000

openfeign:
  client:
    url: https://leetcode-api-pied.vercel.app
