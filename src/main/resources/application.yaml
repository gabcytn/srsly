spring:
  application:
    name: srsly
    frontend:
      url: ${SRSLY_FRONTEND_URL}
  datasource:
    url: jdbc:postgresql://${DB_ADDRESS}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
    retry:
      max-attempts: 2
  mail:
    host: email-smtp.${AWS_SES_REGION}.amazonaws.com
    port: 587
    username: ${AWS_SES_USERNAME}
    password: ${AWS_SES_PASSWORD}
    protocol: smtp
    properties:
      mail:
        debug: true
        smtp:
          auth: true
          starttls:
            enable: true
            required: true


security:
  jwt:
    secret-key: ${JWT_SECRET_KEY}
    expiration-time: 3600000

openfeign:
  client:
    url: https://leetcode-api-pied.vercel.app
